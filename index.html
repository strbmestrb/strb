<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>strb.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #F5F0E8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      font-family: 'Jost', sans-serif;
    }

    .logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 44px;
      font-weight: 200;
      letter-spacing: 0.28em;
      color: #2C2820;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 11px;
      letter-spacing: 0.22em;
      color: #8C7E6E;
      font-weight: 300;
      margin-bottom: 40px;
    }

    .divider {
      width: 36px;
      height: 0.5px;
      background: #C4B49E;
      margin: 0 auto 40px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 280px;
      padding: 16px 22px;
      background: #FDFAF5;
      border: 0.5px solid #D4C8B4;
      border-radius: 2px;
      text-decoration: none;
      color: #2C2820;
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      letter-spacing: 0.18em;
      font-weight: 400;
      text-transform: uppercase;
      margin-bottom: 12px;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn:hover {
      background: #EDE4D4;
      border-color: #C4B49E;
    }

    .arrow {
      font-size: 14px;
      color: #8C7E6E;
    }

    .footer {
      margin-top: 48px;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #B0A090;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <h1 class="logo">strb.</h1>
  <p class="tagline">mellow glow, let it flow</p>
  <div class="divider"></div>

  <a class="btn" href="https://smartstore.naver.com/strb" target="_blank">
    <span>shop</span>
    <span class="arrow">→</span>
  </a>

  <a class="btn" href="http://instagram.com/strbmestrb" target="_blank">
    <span>instagram</span>
    <span class="arrow">→</span>
  </a>

  <p class="footer">© strb. all rights reserved</p>
</body>
</html>
